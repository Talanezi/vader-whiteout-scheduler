name: Flush creator digests

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  flush:
    runs-on: ubuntu-latest
    steps:
      - name: Call digest flush endpoint
        run: |
          curl -X POST \
            -H "x-cron-secret: ${{ secrets.INTERNAL_CRON_SECRET }}" \
            https://vader-whiteout-scheduler-production.up.railway.app/api/internal/flush-creator-digests
