name: Deploy Scheduler Frontend

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-scheduler"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: https://api-scheduler.vaderwhiteout.com

      - name: Prepare Pages artifact
        run: |
          mkdir -p ../pages-out/scheduler
          cp -r build/* ../pages-out/scheduler/

          cat > ../pages-out/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=/scheduler/" />
              <title>Redirecting...</title>
            </head>
            <body>
              <p>Redirecting to <a href="/scheduler/">/scheduler/</a>...</p>
            </body>
          </html>
          EOF

          cp build/index.html ../pages-out/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
